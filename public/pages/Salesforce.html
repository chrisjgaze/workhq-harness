<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>WorkHQ Salesforce Event Sender</title>
    <link rel="stylesheet" href="../styles/theme.css" />
    <link rel="stylesheet" href="../styles/base.css" />
    <style>
      button {
        width: auto;
        padding: 14px 20px;
        border-radius: 12px;
        border: 0;
        font-weight: 700;
      }

      pre {
        margin-top: 20px;
        padding: 16px;
        border-radius: 12px;
        white-space: pre-wrap;
      }
    </style>
</head>
<body>
  <div class="brand" style="margin-bottom:20px">
    <a href="../index.html" aria-label="Go to WorkHQ Demo Hub">
      <img src="../assets/logo.png" alt="" class="brand-logo">
    </a>
    <h1>WorkHQ Salesforce Event Sender</h1>
  </div>
  <p>Create a mock Salesforce Case/Lead for SaaS connector demos.</p>
  <button onclick="createRecord()">Create Mock Case</button>
  <pre id="out"></pre>
<script>
async function createRecord(){
 const payload={eventId:'EVT-'+crypto.randomUUID(),eventType:'salesforce_case_created',receivedAt:new Date().toISOString(),source:'mock-salesforce-html',businessObject:{objectType:'Case',fields:{Subject:'Invoice dispute INV-10045',Status:'New',Priority:'High',Origin:'Web',Description:'Customer disputes invoice amount and requests review.'}},request:{priority:'high',requiresApproval:true,source:'mock-salesforce-html'}};
 const res=await fetch('http://localhost:3000/create-salesforce-record',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload.businessObject)});
 out.textContent=JSON.stringify({payload,status:res.status,response:await res.text()},null,2);
}
</script>
</body></html>
