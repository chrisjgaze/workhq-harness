<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>WorkHQ API Test Harness</title>
    <link rel="stylesheet" href="../styles/theme.css" />
    <link rel="stylesheet" href="../styles/base.css" />
    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            color: var(--white);
            background: var(--app-background);
            padding: 36px;
        }

        .shell {
            max-width: 1200px;
            margin: auto;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 24px;
            margin-bottom: 28px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .brand-logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(var(--cyan-rgb), 0.6));
        }

        .brand h1 {
            margin: 0;
            font-size: 42px;
            letter-spacing: -1px;
        }

        .brand span {
            display: block;
            font-size: 18px;
            color: var(--muted);
            margin-bottom: 2px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 24px;
            backdrop-filter: blur(14px);
            box-shadow: var(--shadow);
        }

        .login-panel {
            width: 380px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 16px;
            backdrop-filter: blur(14px);
        }

        .login-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .login-row button {
            margin-top: 0;
            width: auto;
            padding: 11px 18px;
            border-radius: 12px;
        }

        .token-status {
            font-size: 13px;
            color: var(--muted);
        }

        .token-box {
            margin-top: 10px;
            max-height: 92px;
            overflow: auto;
            word-break: break-all;
            background: var(--field);
            border: 1px solid rgba(var(--aqua-rgb), 0.25);
            border-radius: 12px;
            padding: 10px;
            font-size: 11px;
            color: var(--code-text);
            display: none;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 22px;
            margin-top: 22px;
        }

        label {
            display: block;
            color: var(--aqua);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin: 16px 0 8px;
        }

        input,
        select,
        textarea {
            width: 100%;
            background: var(--field);
            color: var(--white);
            border: 1px solid rgba(var(--aqua-rgb), 0.35);
            border-radius: 12px;
            padding: 12px;
            font-family: "Segoe UI", Arial, sans-serif;
            font-size: 14px;
        }

        textarea {
            min-height: 360px;
            font-family: Consolas, Monaco, monospace;
            resize: vertical;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 15px 18px;
            border: none;
            border-radius: 16px;
            color: var(--white);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            background: var(--button-gradient);
            box-shadow: 0 0 26px rgba(var(--cyan-rgb), 0.35);
        }

        button:hover {
            box-shadow: 0 0 36px rgba(var(--cyan-rgb), 0.55);
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        pre {
            min-height: 220px;
            background: var(--field);
            color: var(--code-text);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(var(--aqua-rgb), 0.25);
            overflow: auto;
            font-size: 13px;
        }

        .ok {
            color: var(--success);
        }

        .bad {
            color: var(--danger);
        }

        @media (max-width: 950px) {
            .topbar {
                flex-direction: column;
            }

            .login-panel {
                width: 100%;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .brand h1 {
                font-size: 32px;
            }
        }
    </style>
</head>

<body>
    <div class="shell">
        <div class="topbar">
            <div class="brand">
                <a href="../index.html" aria-label="Go to WorkHQ Demo Hub">
                    <img src="../assets/logo.png" class="brand-logo">
                </a>
                <div>
                    <span>SS&C Blue Prism</span>
                    <h1>WorkHQ API Test Harness</h1>
                </div>
            </div>

            <div class="login-panel">
                <div class="login-row">
                    <button id="loginButton" onclick="login()">Login</button>
                    <span id="loginStatus" class="token-status">No bearer token yet.</span>
                </div>
                <div id="tokenBox" class="token-box"></div>
            </div>
        </div>

        <div class="card">
            <h2>Request</h2>

            <label for="method">Method</label>
            <select id="method">
                <option value="POST" selected>POST</option>
                <option value="PUT">PUT</option>
                <option value="PATCH">PATCH</option>
                <option value="GET">GET</option>
                <option value="DELETE">DELETE</option>
            </select>

            <label for="endpoint">Endpoint</label>
            <input id="endpoint"
                value="https://presales.nextgen.blueprism.com/regions/eu-central/api/workflows/v1/webhooks/xKEZYznqXRZZy8o3ARPkn/sync" />

            <label for="body">JSON Body</label>
            <textarea id="body">{
  "eventId": "EVT-10001",
  "eventType": "invoice_received",
  "receivedAt": "2026-04-28T12:00:00.000Z",
  "invoice": {
    "invoiceId": "INV-10045",
    "supplierName": "Acme Trading LLC",
    "supplierCountry": "AE",
    "amount": 12500.75,
    "currency": "AED",
    "status": "Pending Review"
  },
  "request": {
    "priority": "medium",
    "requiresApproval": true,
    "source": "workhq-test-harness"
  }
}</textarea>

            <button id="sendButton" onclick="sendRequest()">Send Request</button>
        </div>

        <div class="grid">
            <div class="card">
                <h2>Request Sent</h2>
                <pre id="requestOutput">Nothing sent yet.</pre>
            </div>

            <div class="card">
                <h2>Response</h2>
                <pre id="responseOutput">No response yet.</pre>
            </div>
        </div>
    </div>

    <script>
        let bearerToken = null;

        async function login() {
            const button = document.getElementById("loginButton");
            const status = document.getElementById("loginStatus");
            const tokenBox = document.getElementById("tokenBox");

            button.disabled = true;
            status.textContent = "Getting token...";
            status.className = "token-status";

            try {
                const res = await fetch("http://localhost:3000/token");
                const data = await res.json();
                bearerToken = data.access_token;
                status.textContent = "Bearer token acquired.";
                status.className = "token-status ok";

                tokenBox.style.display = "block";
                tokenBox.textContent = bearerToken;
            } catch (err) {
                bearerToken = null;

                status.textContent = "Login failed.";
                status.className = "token-status bad";

                tokenBox.style.display = "block";
                tokenBox.textContent = String(err);
            } finally {
                button.disabled = false;
            }
        }

        function parseJsonBody(rawBody) {
            if (!rawBody.trim()) return null;
            return JSON.parse(rawBody);
        }

        function formatHeaders(headers) {
            const result = {};
            headers.forEach((value, key) => {
                result[key] = value;
            });
            return result;
        }

        async function sendRequest() {
            const endpoint = document.getElementById("endpoint").value.trim();
            const method = document.getElementById("method").value;
            const rawBody = document.getElementById("body").value;
            const sendButton = document.getElementById("sendButton");

            if (!bearerToken) {
                document.getElementById("responseOutput").textContent =
                    "No bearer token available. Click Login first.";
                return;
            }

            if (!endpoint) {
                document.getElementById("responseOutput").textContent =
                    "Endpoint is required.";
                return;
            }

            let parsedBody = null;

            try {
                parsedBody = parseJsonBody(rawBody);
            } catch (err) {
                document.getElementById("responseOutput").textContent =
                    "Invalid JSON body:\n" + String(err);
                return;
            }

            const headers = {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${bearerToken}`
            };

            const requestOptions = {
                method,
                headers
            };

            if (!["GET", "DELETE"].includes(method) && parsedBody !== null) {
                requestOptions.body = JSON.stringify(parsedBody);
            }

            document.getElementById("requestOutput").textContent =
                JSON.stringify({
                    endpoint,
                    method,
                    headers: {
                        "Content-Type": headers["Content-Type"],
                        "Authorization": "Bearer " + bearerToken.slice(0, 20) + "..."
                    },
                    body: parsedBody
                }, null, 2);

            sendButton.disabled = true;
            document.getElementById("responseOutput").textContent = "Sending...";

            try {
                const response = await fetch("http://localhost:3000/proxy", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        endpoint,
                        method,
                        token: bearerToken,
                        body: parsedBody
                    })
                });
                const responseText = await response.text();

                let responseBody;
                try {
                    responseBody = JSON.parse(responseText);
                } catch {
                    responseBody = responseText;
                }

                document.getElementById("responseOutput").textContent =
                    JSON.stringify({
                        status: response.status,
                        statusText: response.statusText,
                        ok: response.ok,
                        headers: formatHeaders(response.headers),
                        body: responseBody
                    }, null, 2);

            } catch (error) {
                document.getElementById("responseOutput").textContent =
                    "Request failed:\n" + String(error);
            } finally {
                sendButton.disabled = false;
            }
        }
    </script>
</body>

</html>
